<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-FUSION</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --dark-bg: #00050a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 우측 상단 언어 선택 영역 */
        .nav-languages {
            position: absolute;
            top: 25px;
            right: 25px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            z-index: 10;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid rgba(255, 102, 0, 0.4);
            color: var(--neon-orange);
            padding: 6px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-btn:hover {
            background: var(--neon-orange);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-orange);
        }

        /* 메인 콘텐츠 */
        .content-box {
            text-align: center;
            animation: fadeIn 2s ease-in;
        }

        .brand-logo {
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange), 0 0 30px var(--neon-orange);
            margin: 0;
            letter-spacing: 8px;
            transform: skew(-5deg);
        }

        .slogan-box {
            margin-top: 30px;
            min-height: 80px;
        }

        .slogan-text {
            font-size: 1.8rem;
            font-weight: 300;
            opacity: 0.9;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        .customer-success {
            font-size: 1.2rem;
            color: var(--neon-orange);
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* 이메일 정보 */
        .footer-info {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
        }

        .footer-info a {
            color: var(--neon-orange);
            text-decoration: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 배경 우주 질감 */
        .bg-stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1128 0%, #00050a 100%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-stars"></div>

    <nav class="nav-languages">
        <button class="lang-btn" onclick="updateContent('ko')">한국어</button>
        <button class="lang-btn" onclick="updateContent('en')">English</button>
        <button class="lang-btn" onclick="updateContent('zh')">Chinese</button>
        <button class="lang-btn" onclick="updateContent('ar')">Arabic</button>
        <button class="lang-btn" onclick="updateContent('hi')">Hindi</button>
        <button class="lang-btn" onclick="updateContent('ru')">Russian</button>
        <button class="lang-btn" onclick="updateContent('fr')">French</button>
        <button class="lang-btn" onclick="updateContent('uk')">Ukraine</button>
        <button class="lang-btn" onclick="updateContent('ja')">Japanese</button>
        <button class="lang-btn" onclick="updateContent('es')">Spanish</button>
    </nav>

    <div class="content-box">
        <h1 class="brand-logo">HK-FUSION</h1>
        <div class="slogan-box">
            <div id="main-slogan" class="slogan-text">인류의 영원한 태양을 우주에 띄우다</div>
            <div id="sub-slogan" class="customer-success">고객의 성공을 위하여</div>
        </div>
    </div>

    <div class="footer-info">
        Contact: <a href="mailto:info@fusion.com">info@fusion.com</a>
    </div>

    <script>
        const translations = {
            'ko': { s: '인류의 영원한 태양을 우주에 띄우다', t: '고객의 성공을 위하여' },
            'en': { s: "Launching Humanity's Eternal Sun into Space", t: 'For Customer Success' },
            'zh': { s: '将人类永恒的太阳升入太空', t: '助力客户成功' },
            'ar': { s: 'إطلاق شمس البشرية الأبدية في الفضاء', t: 'من أجل نجاح العملاء' },
            'hi': { s: 'मानवता के शाश्वत सूर्य को अंतरिक्ष में प्रक्षेपित करना', t: 'ग्राहकों की सफलता के लिए' },
            'ru': { s: 'Запуск вечного солнца человечества в космос', t: 'Ради успеха клиентов' },
            'fr': { s: "Lancer le soleil éternel de l'humanité dans l'espace", t: 'Pour le succès du client' },
            'uk': { s: 'Запуск вічного сонця людства в космос', t: 'Заради успіху клієнтів' },
            'ja': { s: '人類の永遠の太陽を宇宙に浮かべる', t: '顧客の成功のために' },
            'es': { s: 'Lanzando el sol eterno de la humanidad al espacio', t: 'Por el éxito del cliente' }
        };

        function updateContent(lang) {
            const slogan = document.getElementById('main-slogan');
            const target = document.getElementById('sub-slogan');
            
            // 페이드 효과를 위해 잠시 투명하게
            slogan.style.opacity = 0;
            target.style.opacity = 0;

            setTimeout(() => {
                slogan.innerText = translations[lang].s;
                target.innerText = translations[lang].t;
                slogan.style.opacity = 1;
                target.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
